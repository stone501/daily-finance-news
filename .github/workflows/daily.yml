name: 每日财税资讯推送

on:
  schedule:
    # UTC 23:00 = 北京时间 07:00（每天）
    - cron: '0 23 * * *'
  workflow_dispatch: # 支持手动触发（测试用）

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 打印出口 IP（用于配置公众号白名单）
        run: |
          echo "GitHub Actions 出口 IP："
          curl -s https://api.ipify.org || echo "获取失败"
          echo ""

      - name: 执行推送流程
        env:
          MP_APPID: ${{ secrets.MP_APPID }}
          MP_SECRET: ${{ secrets.MP_SECRET }}
          WECOM_CORPID: ${{ secrets.WECOM_CORPID }}
          WECOM_AGENTID: ${{ secrets.WECOM_AGENTID }}
          WECOM_SECRET: ${{ secrets.WECOM_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python main.py
